<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shadow Survivor Mobile</title>
    <style>
        body { margin: 0; background: #050505; color: white; overflow: hidden; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; }
        .stat { font-size: 18px; font-weight: bold; text-shadow: 2px 2px #000; color: #00ffcc; }
        #joy-container { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; }
        #joy-stick { position: absolute; width: 40px; height: 40px; background: rgba(255,255,255,0.4); border-radius: 50%; top: 30px; left: 30px; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="stat">УРОВЕНЬ: <span id="lvl">1</span></div>
        <div class="stat">СЧЕТ: <span id="score">0</span></div>
    </div>
    <div id="joy-container"><div id="joy-stick"></div></div>
    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const lvlDisplay = document.getElementById('lvl');
const scoreDisplay = document.getElementById('score');

// Настройки экрана
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Состояние игрока
const player = {
    x: canvas.width / 2, y: canvas.height / 2,
    r: 15, color: '#00ffcc',
    hp: 100, lvl: 1, score: 0,
    speed: 3,
    vx: 0, vy: 0
};

let enemies = [];
let bullets = [];
let particles = [];
let frame = 0;

// Джойстик
const joyCont = document.getElementById('joy-container');
const joyStick = document.getElementById('joy-stick');
let joyData = { x: 0, y: 0, active: false };

window.addEventListener('touchstart', e => {
    const touch = e.touches[0];
    if (touch.clientX < canvas.width / 2) { // Левая часть экрана для джойстика
        joyData.active = true;
        updateJoy(touch);
    }
});

window.addEventListener('touchmove', e => { if(joyData.active) updateJoy(e.touches[0]); });
window.addEventListener('touchend', () => {
    joyData.active = false;
    player.vx = 0; player.vy = 0;
    joyStick.style.transform = `translate(0px, 0px)`;
});

function updateJoy(touch) {
    const rect = joyCont.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    let dx = touch.clientX - centerX;
    let dy = touch.clientY - centerY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const max = 40;

    if (dist > max) { dx *= max/dist; dy *= max/dist; }
    
    joyStick.style.transform = `translate(${dx}px, ${dy}px)`;
    player.vx = (dx / max) * player.speed;
    player.vy = (dy / max) * player.speed;
}

// Классы объектов
class Enemy {
    constructor() {
        const side = Math.floor(Math.random() * 4);
        if(side == 0) { this.x = -20; this.y = Math.random() * canvas.height; }
        else if(side == 1) { this.x = canvas.width + 20; this.y = Math.random() * canvas.height; }
        else if(side == 2) { this.x = Math.random() * canvas.width; this.y = -20; }
        else { this.x = Math.random() * canvas.width; this.y = canvas.height + 20; }
        this.r = 12;
        this.hp = 2 + (player.lvl * 0.5);
        this.speed = 1 + Math.random() * (player.lvl * 0.2);
    }
    update() {
        const angle = Math.atan2(player.y - this.y, player.x - this.x);
        this.x += Math.cos(angle) * this.speed;
        this.y += Math.sin(angle) * this.speed;
    }
    draw() {
        ctx.fillStyle = '#ff4444';
        ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.fill();
    }
}

class Bullet {
    constructor(tx, ty) {
        this.x = player.x; this.y = player.y;
        const angle = Math.atan2(ty - player.y, tx - player.x);
        this.vx = Math.cos(angle) * 7;
        this.vy = Math.sin(angle) * 7;
        this.r = 5;
    }
    update() { this.x += this.vx; this.y += this.vy; }
    draw() {
        ctx.fillStyle = '#ffff00';
        ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.fill();
    }
}

function spawnParticle(x, y) {
    for(let i=0; i<5; i++) {
        particles.push({
            x, y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, life: 1, color: '#ff4444'
        });
    }
}

function loop() {
    ctx.fillStyle = 'rgba(5, 5, 5, 0.3)'; // Эффект хвоста
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Движение игрока
    player.x += player.vx;
    player.y += player.vy;
    
    // Ограничение границами
    player.x = Math.max(player.r, Math.min(canvas.width - player.r, player.x));
    player.y = Math.max(player.r, Math.min(canvas.height - player.r, player.y));

    // Отрисовка игрока
    ctx.fillStyle = player.color;
    ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.stroke();

    // Авто-стрельба в ближайшего врага
    if (frame % 30 === 0 && enemies.length > 0) {
        let nearest = enemies[0];
        let minDist = Infinity;
        enemies.forEach(e => {
            let d = Math.hypot(e.x - player.x, e.y - player.y);
            if(d < minDist) { minDist = d; nearest = e; }
        });
        bullets.push(new Bullet(nearest.x, nearest.y));
    }

    // Обработка пуль
    bullets.forEach((b, i) => {
        b.update(); b.draw();
        if(b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets.splice(i, 1);
    });

    // Обработка врагов
    if (frame % 60 === 0) enemies.push(new Enemy());
    enemies.forEach((e, ei) => {
        e.update(); e.draw();
        
        // Коллизия с игроком
        if(Math.hypot(e.x - player.x, e.y - player.y) < player.r + e.r) {
            location.reload(); // Проигрыш
        }

        // Коллизия с пулями
        bullets.forEach((b, bi) => {
            if(Math.hypot(e.x - b.x, e.y - b.y) < e.r + b.r) {
                e.hp--;
                bullets.splice(bi, 1);
                if(e.hp <= 0) {
                    spawnParticle(e.x, e.y);
                    enemies.splice(ei, 1);
                    player.score += 10;
                    if(player.score % 100 === 0) {
                        player.lvl++;
                        player.speed += 0.2;
                    }
                }
            }
        });
    });

    // Частицы
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        ctx.fillStyle = `rgba(255, 68, 68, ${p.life})`;
        ctx.fillRect(p.x, p.y, 3, 3);
        if(p.life <= 0) particles.splice(i, 1);
    });

    scoreDisplay.innerText = player.score;
    lvlDisplay.innerText = player.lvl;
    frame++;
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
