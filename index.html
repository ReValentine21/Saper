<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NEON RHYTHM X</title>

<style>
:root{
--bg:#050505;
--neon:#00fff7;
--pink:#ff00ea;
--green:#00ff88;
--red:#ff3c3c;
--glass:rgba(255,255,255,.06);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:
radial-gradient(circle at top,#111 0%,#050505 70%);
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

#gameContainer{
position:relative;
width:95vw;
max-width:1000px;
height:95vh;
border-radius:25px;
overflow:hidden;
background:#000;
border:2px solid var(--neon);
box-shadow:
0 0 30px rgba(0,255,255,.25),
inset 0 0 30px rgba(0,255,255,.15);
}

canvas{
width:100%;
height:100%;
display:block;
}

.screen{
position:absolute;
inset:0;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,.88);
backdrop-filter:blur(10px);
z-index:10;
}

.screen.active{
display:flex;
}

h1{
font-size:5rem;
color:var(--neon);
text-shadow:0 0 25px var(--neon);
margin-bottom:30px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.03)}
100%{transform:scale(1)}
}

.btn{
width:320px;
padding:16px;
margin:10px;
border:none;
border-radius:16px;
font-size:1.1rem;
font-weight:bold;
cursor:pointer;
background:var(--glass);
color:white;
border:1px solid rgba(255,255,255,.1);
transition:.25s;
backdrop-filter:blur(12px);
}

.btn:hover{
transform:translateY(-3px) scale(1.03);
background:rgba(0,255,255,.15);
box-shadow:0 0 20px rgba(0,255,255,.3);
}

.song{
width:85%;
padding:20px;
margin:10px;
border-radius:20px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
cursor:pointer;
transition:.25s;
}

.song:hover{
transform:scale(1.02);
border-color:var(--neon);
}

.song h2{
margin-bottom:6px;
}

#ui{
position:absolute;
top:0;
left:0;
width:100%;
padding:18px;
display:none;
justify-content:space-between;
z-index:5;
pointer-events:none;
}

.uiBox{
background:rgba(0,0,0,.45);
padding:12px 18px;
border-radius:14px;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.08);
font-size:1.2rem;
}

#combo{
font-size:2rem;
color:var(--pink);
text-shadow:0 0 12px var(--pink);
}

#accuracy{
color:var(--green);
}

#hpBar{
position:absolute;
top:0;
left:0;
height:8px;
background:linear-gradient(90deg,#00ff88,#00fff7);
z-index:6;
transition:.2s;
}

#feedback{
position:absolute;
top:42%;
left:50%;
transform:translate(-50%,-50%);
font-size:5rem;
font-weight:900;
opacity:0;
z-index:9;
pointer-events:none;
transition:.15s;
}

#countdown{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:8rem;
font-weight:900;
z-index:9;
display:none;
text-shadow:0 0 20px white;
}

#exitBtn{
position:absolute;
bottom:20px;
right:20px;
z-index:10;
padding:12px 22px;
border:none;
border-radius:12px;
background:rgba(255,0,0,.2);
color:white;
cursor:pointer;
font-weight:bold;
display:none;
}

.setting{
margin:15px;
font-size:1.1rem;
}

input[type=checkbox]{
transform:scale(1.4);
margin-left:10px;
}

.mobileHint{
position:absolute;
bottom:10px;
width:100%;
text-align:center;
font-size:.9rem;
opacity:.5;
}

@media(max-width:700px){

h1{
font-size:3rem;
}

.btn{
width:85%;
}

.song{
width:92%;
}

}
</style>
</head>
<body>

<div id="gameContainer">

<div id="hpBar"></div>

<div id="ui">
<div class="uiBox">
Счёт: <span id="score">0</span>
</div>

<div class="uiBox">
Комбо: <span id="combo">0</span>
</div>

<div class="uiBox">
Точность: <span id="accuracy">100%</span>
</div>
</div>

<div id="feedback"></div>
<div id="countdown"></div>

<button id="exitBtn">ВЫЙТИ</button>

<canvas id="game" width="1000" height="900"></canvas>

<!-- MENU -->

<div class="screen active" id="menu">

<h1>NEON RHYTHM X</h1>

<button class="btn" onclick="openSongs()">
ИГРАТЬ
</button>

<button class="btn" onclick="openSettings()">
НАСТРОЙКИ
</button>

<div class="mobileHint">
Автоопределение телефона и ПК
</div>

</div>

<!-- SONGS -->

<div class="screen" id="songs">

<h1>ПЕСНИ</h1>

<div class="song" onclick="startGame(0)">
<h2>1. Fur Elise</h2>
<p>Очень легко</p>
</div>

<div class="song" onclick="startGame(1)">
<h2>2. River Flows In You</h2>
<p>Легко</p>
</div>

<div class="song" onclick="startGame(2)">
<h2>3. Experience</h2>
<p>Средне</p>
</div>

<div class="song" onclick="startGame(3)">
<h2>4. Interstellar</h2>
<p>Сложно</p>
</div>

<div class="song" onclick="startGame(4)">
<h2>5. Rush E</h2>
<p>Очень сложно</p>
</div>

<div class="song" onclick="startGame(5)">
<h2>6. La Campanella</h2>
<p>БЕЗУМИЕ</p>
</div>

<button class="btn" onclick="show('menu')">
НАЗАД
</button>

</div>

<!-- SETTINGS -->

<div class="screen" id="settings">

<h1>НАСТРОЙКИ</h1>

<div class="setting">
Эффекты
<input type="checkbox" id="effects" checked>
</div>

<div class="setting">
Screen Shake
<input type="checkbox" id="shake" checked>
</div>

<div class="setting">
Spam Mode
<input type="checkbox" id="spam">
</div>

<button class="btn" onclick="show('menu')">
СОХРАНИТЬ
</button>

</div>

<!-- GAME OVER -->

<div class="screen" id="gameover">

<h1>GAME OVER</h1>

<h2 id="finalScore"></h2>

<button class="btn" onclick="openSongs()">
ЕЩЁ РАЗ
</button>

<button class="btn" onclick="show('menu')">
МЕНЮ
</button>

</div>

</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const mobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

const tracks = 4;
const trackWidth = canvas.width / tracks;
const hitY = canvas.height - 180;

let notes = [];
let particles = [];

let score = 0;
let combo = 0;
let misses = 0;
let hits = 0;

let hp = 100;

let playing = false;

let effects = true;
let shake = true;
let spamMode = false;

let controls = ["d","f","j","k"];

const songs = [
{speed:4,count:40},
{speed:5,count:60},
{speed:6,count:90},
{speed:7,count:120},
{speed:9,count:180},
{speed:11,count:250}
];

function randomTrack(){
return Math.floor(Math.random()*4);
}

function buildLevel(data){

notes=[];

for(let i=0;i<data.count;i++){

notes.push({
track:randomTrack(),
y:-i*220,
hit:false,
speed:data.speed
});

}

}

function show(id){

document.querySelectorAll(".screen").forEach(s=>{
s.classList.remove("active");
});

document.getElementById(id).classList.add("active");

}

function openSongs(){
show("songs");
}

function openSettings(){
show("settings");
}

function countdown(cb){

const c = document.getElementById("countdown");

c.style.display="block";

let n = 3;

c.innerText = n;

const interval = setInterval(()=>{

n--;

if(n===0){
c.innerText="START!";
}else{
c.innerText=n;
}

if(n<0){

clearInterval(interval);

c.style.display="none";

cb();

}

},1000);

}

function startGame(id){

effects = document.getElementById("effects").checked;
shake = document.getElementById("shake").checked;
spamMode = document.getElementById("spam").checked;

show("");

countdown(()=>{

playing=true;

score=0;
combo=0;
misses=0;
hits=0;
hp=100;

buildLevel(songs[id]);

document.getElementById("ui").style.display="flex";
document.getElementById("exitBtn").style.display="block";

loop();

});

}

document.getElementById("exitBtn").onclick=()=>{

playing=false;

document.getElementById("ui").style.display="none";
document.getElementById("exitBtn").style.display="none";

show("songs");

};

function feedback(text,color){

const el = document.getElementById("feedback");

el.innerText=text;
el.style.color=color;
el.style.opacity=1;
el.style.transform="translate(-50%,-50%) scale(1.3)";

setTimeout(()=>{

el.style.opacity=0;
el.style.transform="translate(-50%,-50%) scale(1)";

},180);

}

function hit(track){

if(!playing)return;

let found = false;

for(let n of notes){

if(n.hit) continue;

if(n.track!==track) continue;

const dist = Math.abs(n.y-hitY);

if(dist<90){

n.hit=true;

found=true;

hits++;

combo++;

score += 100 * combo;

if(dist<40){
feedback("PERFECT","#00ff88");
}else{
feedback("GOOD","#ffe600");
}

spawnParticles(n.x,hitY,n.track);

break;

}

}

if(!found && !spamMode){

combo=0;

feedback("MISS","#ff3c3c");

misses++;

hp-=10;

}

updateUI();

}

window.addEventListener("keydown",e=>{

const idx = controls.indexOf(e.key.toLowerCase());

if(idx!==-1){

hit(idx);

}

});

canvas.addEventListener("touchstart",e=>{

if(!mobile)return;

const rect = canvas.getBoundingClientRect();

for(let touch of e.touches){

const x = touch.clientX - rect.left;

const track = Math.floor(x / (rect.width/4));

hit(track);

}

});

function spawnParticles(x,y,t){

if(!effects)return;

for(let i=0;i<15;i++){

particles.push({
x,y,
vx:(Math.random()-.5)*8,
vy:(Math.random()-.5)*8,
life:30,
color:["#00fff7","#ff00ea","#00ff88","#ffe600"][t]
});

}

}

function drawTracks(){

for(let i=0;i<4;i++){

ctx.fillStyle="rgba(255,255,255,.05)";
ctx.fillRect(i*trackWidth,0,trackWidth-2,canvas.height);

if(!mobile){

ctx.fillStyle="white";
ctx.font="32px Arial";
ctx.fillText(
controls[i].toUpperCase(),
i*trackWidth+100,
canvas.height-40
);

}

}

ctx.fillStyle="rgba(0,255,255,.1)";
ctx.fillRect(0,hitY-60,canvas.width,120);

ctx.strokeStyle="#00fff7";
ctx.lineWidth=4;

ctx.beginPath();
ctx.moveTo(0,hitY);
ctx.lineTo(canvas.width,hitY);
ctx.stroke();

}

function drawNotes(){

for(let n of notes){

if(n.hit) continue;

n.y += n.speed;

n.x = n.track*trackWidth + trackWidth/2;

ctx.beginPath();

ctx.fillStyle=[
"#00fff7",
"#ff00ea",
"#00ff88",
"#ffe600"
][n.track];

ctx.shadowBlur=25;
ctx.shadowColor=ctx.fillStyle;

ctx.arc(n.x,n.y,40,0,Math.PI*2);

ctx.fill();

if(n.y>hitY+120){

n.hit=true;

combo=0;

misses++;

hp-=10;

feedback("MISS","#ff3c3c");

updateUI();

}

}

}

function drawParticles(){

for(let i=particles.length-1;i>=0;i--){

const p = particles[i];

p.x += p.vx;
p.y += p.vy;
p.life--;

ctx.fillStyle=p.color;
ctx.globalAlpha=p.life/30;

ctx.beginPath();
ctx.arc(p.x,p.y,6,0,Math.PI*2);
ctx.fill();

ctx.globalAlpha=1;

if(p.life<=0){

particles.splice(i,1);

}

}

}

function updateUI(){

document.getElementById("score").innerText=score;

document.getElementById("combo").innerText=combo;

const acc = hits+misses===0
?100
:Math.floor(hits/(hits+misses)*100);

document.getElementById("accuracy").innerText=acc+"%";

document.getElementById("hpBar").style.width=hp+"%";

}

function loop(){

if(!playing)return;

ctx.clearRect(0,0,canvas.width,canvas.height);

if(shake && combo>15){

canvas.style.transform=`
translate(
${(Math.random()-.5)*3}px,
${(Math.random()-.5)*3}px
)
`;

}else{

canvas.style.transform="translate(0,0)";

}

drawTracks();
drawNotes();
drawParticles();

if(hp<=0){

playing=false;

document.getElementById("ui").style.display="none";
document.getElementById("exitBtn").style.display="none";

document.getElementById("finalScore").innerText=
`Счёт: ${score}`;

show("gameover");

return;

}

requestAnimationFrame(loop);

}

</script>

</body>
</html>
