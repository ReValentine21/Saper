        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;700&display=swap');

        :root {
            --cell-size: 36px; /* Базовый размер клетки */
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --cell-closed: #334155;
            --cell-closed-hover: #475569;
            --cell-open: #cbd5e1;
            --text-color: #f8fafc;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Roboto', sans-serif;
            overflow: hidden; /* Запрещаем скролл всей страницы, скроллится только поле */
            touch-action: none; /* Отключаем стандартные жесты браузера для корректной работы игры */
            user-select: none;
            -webkit-user-select: none;
        }

        /* Цифровой шрифт для таймера и счетчиков */
        .digital-font {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
        }

        /* Контейнер игрового поля со скроллом для больших карт */
        #game-container-wrapper {
            width: 100%;
            height: calc(100vh - 160px); /* Высота минус шапка и панель */
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

            display: grid;
            gap: 2px;
            background-color: #0f172a;
            padding: 4px;
            border-radius: 8px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            border: 2px solid #334155;
            margin: auto; /* Для центрирования в flex-контейнере */
        }

        /* Стили отдельной клетки */
        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            background-color: var(--cell-closed);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;

            box-shadow: inset 2px 2px 0px rgba(255,255,255,0.2), inset -2px -2px 0px rgba(0,0,0,0.3);
        }

        .cell:active:not(.revealed) {
            transform: scale(0.95);
        }

        /* Состояние открытой клетки */
        .cell.revealed {
            background-color: var(--cell-open);
            box-shadow: inset 1px 1px 3px rgba(0,0,0,0.3);
            cursor: default;
        }

        /* Стилизация цифр (как в классике) */
        .cell[data-value="1"] { color: #1d4ed8; } /* Синий */
        .cell[data-value="2"] { color: #15803d; } /* Зеленый */
        .cell[data-value="3"] { color: #b91c1c; } /* Красный */
        .cell[data-value="4"] { color: #6d28d9; } /* Фиолетовый */
        .cell[data-value="5"] { color: #7c2d12; } /* Темно-красный */
        .cell[data-value="6"] { color: #0f766e; } /* Бирюзовый */
        .cell[data-value="7"] { color: #000000; } /* Черный */
        .cell[data-value="8"] { color: #52525b; } /* Серый */

        /* Анимация взрыва клетки */
        @keyframes explode {
            0% { transform: scale(1); background-color: #ef4444; }
            50% { transform: scale(1.2); background-color: #fca5a5; }
            100% { transform: scale(1); background-color: #ef4444; }
        }
        .cell.exploded {
            animation: explode 0.4s ease-out forwards;
            color: black;
            font-size: 24px;
            z-index: 10;
        }

        /* Анимация появления флага */
        @keyframes pop {
            0% { transform: scale(0); }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); }

        }

        /* Модальные окна */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;

        .modal-content {

        .modal-overlay.active .modal-content {

        #effects-canvas {

    </style>
</head>

        class SoundEngine {
            constructor() {
                this.ctx = null;
                this.enabled = true;

                    }
                }

            playDig() {
                if (!this.enabled || !this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, this.ctx.currentTime + 0.05);
                
                gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.05);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.start();
                osc.stop(this.ctx.currentTime + 0.05);
            }

            // Звук установки флажка (высокий мелодичный "пинь")
            playFlag() {
                if (!this.enabled || !this.ctx) return;
                const osc = this.ctx.createOscillator();

                gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.start();
                osc.stop(this.ctx.currentTime + 0.15);
            }

                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.start();
                osc.stop(this.ctx.currentTime + 0.15);
