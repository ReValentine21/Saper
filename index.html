<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NEON RHYTHM X</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#050505;
overflow:hidden;
height:100vh;
color:white;
}

#app{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
background:
radial-gradient(circle at top,#111,#000 70%);
}

canvas{
position:absolute;
inset:0;
width:100%;
height:100%;
}

.screen{
position:absolute;
inset:0;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:20;
background:rgba(0,0,0,.85);
backdrop-filter:blur(12px);
padding:20px;
}

.screen.active{
display:flex;
}

h1{
font-size:4rem;
margin-bottom:30px;
color:#00fff7;
text-shadow:0 0 20px #00fff7;
text-align:center;
}

.btn{
width:min(400px,90vw);
padding:18px;
margin:10px;
border:none;
border-radius:18px;
background:rgba(255,255,255,.08);
color:white;
font-size:1.1rem;
font-weight:bold;
cursor:pointer;
transition:.2s;
border:1px solid rgba(255,255,255,.08);
}

.btn:active{
transform:scale(.96);
}

.song{
width:min(500px,95vw);
padding:18px;
margin:8px;
border-radius:18px;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.08);
}

.song h2{
margin-bottom:5px;
}

#ui{
position:absolute;
top:0;
left:0;
width:100%;
padding:15px;
display:none;
justify-content:space-between;
align-items:center;
z-index:10;
}

.uiBox{
background:rgba(0,0,0,.45);
padding:12px 16px;
border-radius:15px;
font-weight:bold;
backdrop-filter:blur(10px);
}

#hpWrap{
position:absolute;
top:0;
left:0;
width:100%;
height:8px;
background:#111;
z-index:11;
}

#hp{
height:100%;
width:100%;
background:linear-gradient(90deg,#00ff88,#00fff7);
transition:.2s;
}

#feedback{
position:absolute;
top:45%;
left:50%;
transform:translate(-50%,-50%);
font-size:4rem;
font-weight:900;
opacity:0;
transition:.15s;
z-index:12;
pointer-events:none;
}

#countdown{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:7rem;
font-weight:900;
z-index:15;
display:none;
text-shadow:0 0 20px white;
}

#exitBtn{
position:absolute;
bottom:20px;
right:20px;
padding:15px 20px;
border:none;
border-radius:15px;
background:rgba(255,0,0,.2);
color:white;
font-weight:bold;
z-index:20;
display:none;
}

.setting{
margin:12px;
font-size:1.1rem;
}

input[type='checkbox']{
transform:scale(1.3);
margin-left:10px;
}

@media (max-width:700px){

h1{
font-size:2.5rem;
}

#feedback{
font-size:3rem;
}

#countdown{
font-size:5rem;
}

}
</style>
</head>
<body>

<div id="app">

<canvas id="game"></canvas>

<div id="hpWrap">
<div id="hp"></div>
</div>

<div id="ui">
<div class="uiBox">Score: <span id="score">0</span></div>
<div class="uiBox">Combo: <span id="combo">0</span></div>
<div class="uiBox">Miss: <span id="miss">0</span>/10</div>
</div>

<div id="feedback"></div>
<div id="countdown"></div>

<button id="exitBtn">ВЫЙТИ</button>

<!-- MENU -->
<div class="screen active" id="menu">
<h1>NEON RHYTHM X</h1>
<button class="btn" onclick="openSongs()">ИГРАТЬ</button>
<button class="btn" onclick="openSettings()">НАСТРОЙКИ</button>
</div>

<!-- SONGS -->
<div class="screen" id="songs">
<h1>ПЕСНИ</h1>

<div class="song" onclick="startLevel(0)">
<h2>Fur Elise</h2>
<p>Очень легко</p>
</div>

<div class="song" onclick="startLevel(1)">
<h2>River Flows In You</h2>
<p>Легко</p>
</div>

<div class="song" onclick="startLevel(2)">
<h2>Interstellar</h2>
<p>Средне</p>
</div>

<div class="song" onclick="startLevel(3)">
<h2>Experience</h2>
<p>Сложно</p>
</div>

<div class="song" onclick="startLevel(4)">
<h2>Rush E</h2>
<p>Очень сложно</p>
</div>

<button class="btn" onclick="showScreen('menu')">НАЗАД</button>
</div>

<!-- SETTINGS -->
<div class="screen" id="settings">
<h1>НАСТРОЙКИ</h1>

<div class="setting">
Эффекты
<input type="checkbox" id="effects" checked>
</div>

<div class="setting">
Режим спама
<input type="checkbox" id="spamMode">
</div>

<button class="btn" onclick="showScreen('menu')">СОХРАНИТЬ</button>
</div>

<!-- GAMEOVER -->
<div class="screen" id="gameover">
<h1>ИГРА ОКОНЧЕНА</h1>
<h2 id="finalText"></h2>
<button class="btn" onclick="openSongs()">СНОВА</button>
<button class="btn" onclick="showScreen('menu')">МЕНЮ</button>
</div>

</div>

<script>

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}

resize();
window.addEventListener('resize',resize);

const mobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

const tracks = 4;
let laneWidth = canvas.width / tracks;

let notes = [];
let particles = [];

let score = 0;
let combo = 0;
let miss = 0;
let hp = 100;

let gameRunning = false;
let effects = true;
let spamMode = false;

const controls = ['d','f','j','k'];

const levels = [
{speed:5, amount:40},
{speed:6, amount:60},
{speed:7, amount:90},
{speed:8, amount:120},
{speed:10, amount:170}
];

const hitY = () => canvas.height - 180;

function showScreen(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
if(id) document.getElementById(id).classList.add('active');
}

function openSongs(){
showScreen('songs');
}

function openSettings(){
showScreen('settings');
}

function generateLevel(data){
notes=[];

for(let i=0;i<data.amount;i++){
notes.push({
track:Math.floor(Math.random()*4),
y:-i*220,
speed:data.speed,
hit:false
});
}
}

function startLevel(id){

score=0;
combo=0;
miss=0;
hp=100;

notes=[];
particles=[];

laneWidth = canvas.width / tracks;

showScreen();

const countdown = document.getElementById('countdown');
countdown.style.display='block';

let n = 3;
countdown.innerText=n;

const interval = setInterval(()=>{

n--;

if(n>0){
countdown.innerText=n;
}
else if(n===0){
countdown.innerText='START!';
}
else{
clearInterval(interval);
countdown.style.display='none';
begin(id);
}

},1000);

}

function begin(id){

effects = document.getElementById('effects').checked;
spamMode = document.getElementById('spamMode').checked;

gameRunning = true;

generateLevel(levels[id]);

document.getElementById('ui').style.display='flex';
document.getElementById('exitBtn').style.display='block';

requestAnimationFrame(loop);
}

function endGame(){

gameRunning=false;

document.getElementById('ui').style.display='none';
document.getElementById('exitBtn').style.display='none';

document.getElementById('finalText').innerText = 'Счёт: ' + score;

showScreen('gameover');
}

function updateUI(){

document.getElementById('score').innerText=score;
document.getElementById('combo').innerText=combo;
document.getElementById('miss').innerText=miss;
document.getElementById('hp').style.width = hp + '%';

}

function feedback(text,color){

const el = document.getElementById('feedback');

el.innerText=text;
el.style.color=color;
el.style.opacity=1;
el.style.transform='translate(-50%,-50%) scale(1.3)';

setTimeout(()=>{
el.style.opacity=0;
el.style.transform='translate(-50%,-50%) scale(1)';
},200);

}

function createParticles(x,y,color){

if(!effects) return;

for(let i=0;i<15;i++){
particles.push({
x,y,
vx:(Math.random()-.5)*8,
vy:(Math.random()-.5)*8,
life:30,
color
});
}

}

function hit(track){

if(!gameRunning) return;

let found = false;

for(let n of notes){

if(n.hit) continue;

if(n.track !== track) continue;

const dist = Math.abs(n.y - hitY());

if(dist < 90){

n.hit = true;
found = true;

combo++;
score += 100 * combo;

if(dist < 35){
feedback('PERFECT','#00ff88');
}
else{
feedback('GOOD','#ffe600');
}

createParticles(
track*laneWidth+laneWidth/2,
hitY(),
'#00fff7'
);

break;

}

}

if(!found && !spamMode){
combo=0;
miss++;
hp-=10;
feedback('MISS','#ff3c3c');
}

if(miss>=10 || hp<=0){
endGame();
}

updateUI();

}

window.addEventListener('keydown',e=>{

const idx = controls.indexOf(e.key.toLowerCase());

if(idx !== -1){
hit(idx);
}

});

canvas.addEventListener('touchstart',e=>{

if(!mobile) return;

const rect = canvas.getBoundingClientRect();

for(let t of e.touches){

const x = t.clientX - rect.left;

const lane = Math.floor(x / (rect.width/4));

hit(lane);

}

});

function drawTracks(){

for(let i=0;i<4;i++){

ctx.fillStyle = i%2===0
? 'rgba(255,255,255,.04)'
: 'rgba(255,255,255,.07)';

ctx.fillRect(i*laneWidth,0,laneWidth-2,canvas.height);

ctx.strokeStyle='rgba(0,255,255,.15)';
ctx.strokeRect(i*laneWidth,0,laneWidth,canvas.height);

if(!mobile){
ctx.fillStyle='white';
ctx.font='30px Arial';
ctx.fillText(
controls[i].toUpperCase(),
i*laneWidth+laneWidth/2-10,
canvas.height-40
);
}

}

ctx.fillStyle='rgba(0,255,255,.12)';
ctx.fillRect(0,hitY()-60,canvas.width,120);

ctx.strokeStyle='#00fff7';
ctx.lineWidth=4;
ctx.beginPath();
ctx.moveTo(0,hitY());
ctx.lineTo(canvas.width,hitY());
ctx.stroke();

}

function drawNotes(){

for(let n of notes){

if(n.hit) continue;

n.y += n.speed;

const x = n.track*laneWidth + laneWidth/2;

ctx.beginPath();
ctx.fillStyle=['#00fff7','#ff00ea','#00ff88','#ffe600'][n.track];
ctx.shadowBlur=25;
ctx.shadowColor=ctx.fillStyle;
ctx.arc(x,n.y,35,0,Math.PI*2);
ctx.fill();

if(n.y > canvas.height+100){

n.hit=true;
combo=0;
miss++;
hp-=10;
feedback('MISS','#ff3c3c');
updateUI();

if(miss>=10){
endGame();
}

}

}

ctx.shadowBlur=0;

}

function drawParticles(){

for(let i=particles.length-1;i>=0;i--){

const p = particles[i];

p.x += p.vx;
p.y += p.vy;
p.life--;

ctx.globalAlpha = p.life / 30;
ctx.fillStyle = p.color;
ctx.beginPath();
ctx.arc(p.x,p.y,5,0,Math.PI*2);
ctx.fill();
ctx.globalAlpha = 1;

if(p.life<=0){
particles.splice(i,1);
}

}

}

function loop(){

if(!gameRunning) return;

ctx.clearRect(0,0,canvas.width,canvas.height);

laneWidth = canvas.width / tracks;

drawTracks();
drawNotes();
drawParticles();

requestAnimationFrame(loop);

}

updateUI();

// FIX ЧЕРНОГО ЭКРАНА
showScreen('menu');

document.getElementById('exitBtn').onclick = ()=>{

gameRunning=false;

document.getElementById('ui').style.display='none';
document.getElementById('exitBtn').style.display='none';

showScreen('songs');

};

</script>

</body>
</html>
