<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Neon Rhythm v2: Beatmap Edition</title>
    <style>
        :root {
            --primary-color: #0ff;
            --bg-color: #0a0a0a;
            --text-color: #fff;
            --track-color: rgba(255, 255, 255, 0.08);
            --hit-zone: rgba(0, 255, 150, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-color); color: var(--text-color); overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }

        #app-container {
            position: relative;
            width: 600px;
            height: 850px;
            background: #000;
            border: 3px solid var(--primary-color);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
            border-radius: 15px;
            overflow: hidden;
        }

        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.9); z-index: 10; padding: 20px;
        }
        .screen.active { display: flex; }

        h1 { font-size: 3.5rem; color: var(--primary-color); text-shadow: 0 0 15px var(--primary-color); margin-bottom: 2rem; }
        .btn {
            background: transparent; border: 2px solid var(--primary-color); color: var(--primary-color);
            padding: 12px 30px; font-size: 1.2rem; margin: 8px; cursor: pointer; border-radius: 8px;
            transition: 0.3s; width: 280px; text-transform: uppercase; font-weight: bold;
        }
        .btn:hover { background: var(--primary-color); color: #000; box-shadow: 0 0 20px var(--primary-color); }

        /* Песни */
        .song-list { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .song-card {
            background: #111; border: 1px solid #333; width: 80%; padding: 15px; margin: 5px;
            cursor: pointer; border-radius: 10px; transition: 0.2s; text-align: center;
        }
        .song-card:hover { border-color: var(--primary-color); background: #1a1a1a; }

        /* Настройки */
        .key-input {
            width: 100px; height: 50px; background: #222; border: 2px solid #444; color: #fff;
            text-align: center; font-size: 1rem; border-radius: 5px; margin: 10px; cursor: pointer;
        }
        .key-input:focus { border-color: var(--primary-color); outline: none; }

        canvas { display: block; width: 100%; height: 100%; }

        #game-ui {
            position: absolute; top: 20px; width: 100%; display: none;
            justify-content: space-around; font-size: 1.8rem; font-weight: bold; z-index: 5; pointer-events: none;
        }
        #combo-tag { color: #ff00ff; font-size: 2.5rem; text-shadow: 0 0 10px #ff00ff; }

        #hit-feedback {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            font-size: 4rem; font-weight: 900; opacity: 0; pointer-events: none; z-index: 6;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="game-ui">
        <div>Счет: <span id="score">0</span></div>
        <div id="combo-tag"><span id="combo">0</span>x</div>
    </div>
    <div id="hit-feedback">PERFECT</div>

    <canvas id="gameCanvas" width="600" height="850"></canvas>

    <div id="screen-menu" class="screen active">
        <h1>NEON RHYTHM</h1>
        <button class="btn" onclick="showScreen('screen-songs')">Выбрать песню</button>
        <button class="btn" onclick="showScreen('screen-settings')">Настройки клавиш</button>
    </div>

    <div id="screen-songs" class="screen">
        <h2>Выберите уровень</h2>
        <div class="song-list">
            <div class="song-card" onclick="startLevel('slow')">
                <h3>Slow Melody</h3>
                <p>Сложность: Легко</p>
            </div>
            <div class="song-card" onclick="startLevel('cyber')">
                <h3>Cyberpunk Night</h3>
                <p>Сложность: Средне</p>
            </div>
            <div class="song-card" onclick="startLevel('rush-e')">
                <h3 style="color: #ff4444;">RUSH E</h3>
                <p>Сложность: БЕЗУМИЕ</p>
            </div>
        </div>
        <button class="btn" onclick="showScreen('screen-menu')">Назад</button>
    </div>

    <div id="screen-settings" class="screen">
        <h2>Настройки управления</h2>
        <p>Нажмите на поле и любую клавишу (включая стрелочки)</p>
        <div>
            <input type="text" class="key-input" id="key0" readonly>
            <input type="text" class="key-input" id="key1" readonly>
            <input type="text" class="key-input" id="key2" readonly>
            <input type="text" class="key-input" id="key3" readonly>
        </div>
        <button class="btn" onclick="saveSettings()">Сохранить</button>
    </div>

    <div id="screen-gameover" class="screen">
        <h1>РЕЗУЛЬТАТ</h1>
        <h2 id="final-res">Счет: 0</h2>
        <button class="btn" onclick="showScreen('screen-songs')">К песням</button>
        <button class="btn" onclick="showScreen('screen-menu')">В меню</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Настройки увеличены для "удобства"
    const config = {
        tracks: 4,
        hitY: 720,              // Линия нажатия
        hitWindowPerfect: 40,   // Хитбокс увеличен
        hitWindowGood: 80,      // Хитбокс увеличен
        noteRadius: 35,         // Кругляшки стали больше
        scrollSpeed: 7          // Скорость падения
    };

    let controls = ['d', 'f', 'j', 'k'];
    let isPlaying = false;
    let score = 0, combo = 0, maxCombo = 0;
    let notes = [], particles = [];
    let startTime = 0;
    let currentBeatmap = [];
    let audioCtx;

    // --- БИТМАПЫ (ПЕСНИ) ---
    // Формат: { time: мс от начала, track: 0-3 }
    const levels = {
        'slow': [
            {time: 1000, t:0}, {time: 2000, t:1}, {time: 3000, t:2}, {time: 4000, t:3},
            {time: 5000, t:1}, {time: 5500, t:2}, {time: 7000, t:0}, {time: 8000, t:3}
        ],
        'cyber': [],
        'rush-e': []
    };

    // Генерация Rush E (автоматическая для примера)
    for(let i=0; i<200; i++) {
        levels['rush-e'].push({time: 500 + (i*150), t: i % 4});
        if(i % 5 === 0) levels['rush-e'].push({time: 500 + (i*150), t: (i+2) % 4});
    }
    // Генерация Cyber
    for(let i=0; i<100; i++) {
        levels['cyber'].push({time: 500 + (i*400), t: Math.floor(Math.random()*4)});
    }

    // --- ЛОГИКА ЭКРАНОВ ---
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('game-ui').style.display = 'none';
        if(id === 'screen-settings') {
            controls.forEach((k, i) => document.getElementById('key'+i).value = k.replace('Arrow', '↑'));
        }
    }

    // Настройка клавиш (поддержка стрелочек)
    document.querySelectorAll('.key-input').forEach((input, i) => {
        input.addEventListener('keydown', (e) => {
            e.preventDefault();
            controls[i] = e.key;
            input.value = e.key.replace('ArrowLeft', '←').replace('ArrowRight', '→').replace('ArrowUp', '↑').replace('ArrowDown', '↓');
        });
    });

    function saveSettings() { showScreen('screen-menu'); }

    // --- ИГРОВОЙ ПРОЦЕСС ---
    function startLevel(levelKey) {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        isPlaying = true;
        score = 0; combo = 0; maxCombo = 0;
        notes = [];
        // Копируем битмап, чтобы не испортить оригинал
        currentBeatmap = JSON.parse(JSON.stringify(levels[levelKey]));
        startTime = performance.now();
        
        document.getElementById('game-ui').style.display = 'flex';
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        
        requestAnimationFrame(gameLoop);
    }

    class Note {
        constructor(track, spawnTime) {
            this.track = track;
            this.spawnTime = spawnTime;
            this.x = (track * 150) + 75;
            this.y = -100;
            this.active = true;
            this.color = ['#0ff', '#f0f', '#0f0', '#ff0'][track];
        }
        update(elapsed) {
            // Позиция зависит от времени: (текущее_время - время_когда_должна_быть_на_линии)
            // Но для простоты оставим линейное падение:
            this.y = config.hitY - (this.spawnTime - elapsed) * (config.scrollSpeed / 10);
            
            if(this.y > canvas.height + 50 && this.active) {
                this.active = false;
                handleHit('miss');
            }
        }
        draw() {
            if(!this.active) return;
            ctx.save();
            ctx.shadowBlur = 20; ctx.shadowColor = this.color;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, config.noteRadius, 0, Math.PI*2);
            ctx.fill();
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 3;
            ctx.stroke();
            ctx.restore();
        }
    }

    function handleHit(type) {
        const feedback = document.getElementById('hit-feedback');
        feedback.style.opacity = '1';
        if(type === 'miss') {
            combo = 0;
            feedback.innerText = 'MISS'; feedback.style.color = 'red';
        } else {
            combo++;
            if(combo > maxCombo) maxCombo = combo;
            score += (type === 'perfect' ? 100 : 50) * (1 + Math.floor(combo/10));
            feedback.innerText = type.toUpperCase();
            feedback.style.color = type === 'perfect' ? '#0f0' : '#ff0';
        }
        document.getElementById('score').innerText = score;
        document.getElementById('combo').innerText = combo;
        setTimeout(() => feedback.style.opacity = '0', 200);
    }

    window.addEventListener('keydown', (e) => {
        if(!isPlaying) return;
        const trackIdx = controls.indexOf(e.key);
        if(trackIdx === -1) return;

        // Ищем ноту на этой дорожке
        const hitNote = notes.find(n => n.active && n.track === trackIdx && Math.abs(n.y - config.hitY) < config.hitWindowGood);
        
        if(hitNote) {
            const dist = Math.abs(hitNote.y - config.hitY);
            hitNote.active = false;
            handleHit(dist < config.hitWindowPerfect ? 'perfect' : 'good');
            playTone(trackIdx);
        } else {
            handleHit('miss');
        }
    });

    function playTone(t) {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.frequency.value = [261, 329, 392, 523][t];
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }

    function gameLoop(now) {
        if(!isPlaying) return;
        const elapsed = now - startTime;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Рисуем дорожки (Исправлено: все серые)
        for(let i=0; i<4; i++) {
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            ctx.fillRect(i*150, 0, 148, canvas.height);
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.font = "20px Arial";
            ctx.fillText(controls[i].replace('Arrow', '').toUpperCase(), i*150+65, 820);
        }

        // Рисуем зону нажатия
        ctx.fillStyle = "rgba(0, 255, 255, 0.1)";
        ctx.fillRect(0, config.hitY - config.hitWindowGood, canvas.width, config.hitWindowGood*2);
        ctx.strokeStyle = "var(--primary-color)";
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(0, config.hitY); ctx.lineTo(canvas.width, config.hitY); ctx.stroke();

        // Спавн нот из битмапа
        if(currentBeatmap.length > 0 && currentBeatmap[0].time < elapsed + 1500) {
            const b = currentBeatmap.shift();
            notes.push(new Note(b.t, b.time));
        }

        // Обновление нот
        notes.forEach(n => { n.update(elapsed); n.draw(); });

        // Проверка конца
        if(currentBeatmap.length === 0 && notes.filter(n => n.active).length === 0) {
            setTimeout(() => {
                isPlaying = false;
                document.getElementById('final-res').innerText = "Счет: " + score;
                showScreen('screen-gameover');
            }, 2000);
        }

        if(isPlaying) requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
