<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Супер Сапёр PRO</title>
    <!-- Используем Tailwind CSS для современного оформления -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* ==========================================================================
           ПОЛЬЗОВАТЕЛЬСКИЕ СТИЛИ И АНИМАЦИИ
           ========================================================================== */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;700;900&display=swap');

        :root {
            --cell-size: 36px;
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --cell-closed: #334155;
            --cell-closed-hover: #475569;
            --cell-open: #cbd5e1;
            --text-color: #f8fafc;
            --grid-gap: 2px;
        }

        /* Адаптация размера клеток для мобильных */
        @media (max-width: 600px) {
            :root { --cell-size: 30px; }
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            touch-action: none; /* Блокировка зума и свайпов */
            user-select: none;
            -webkit-user-select: none;
        }

        /* Цифровой шрифт */
        .digital-font {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
        }

        /* Контейнер со скроллом */
        #game-container-wrapper {
            width: 100%;
            height: calc(100vh - 150px);
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* Сетка игры */
        #game-board {
            display: grid;
            gap: var(--grid-gap);
            background-color: #0f172a;
            padding: 4px;
            border-radius: 8px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            border: 2px solid #334155;
            margin: auto;
            transition: filter 0.3s;
        }

        #game-board.game-over {
            filter: grayscale(0.5);
        }

        /* Клетка */
        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            background-color: var(--cell-closed);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: calc(var(--cell-size) * 0.55);
            cursor: pointer;
            box-shadow: inset 2px 2px 0px rgba(255,255,255,0.15), inset -2px -2px 0px rgba(0,0,0,0.3);
            position: relative;
        }

        .cell:active:not(.revealed):not(.flagged) {
            background-color: var(--cell-closed-hover);
            box-shadow: inset 2px 2px 4px rgba(0,0,0,0.4);
        }

        /* Открытая клетка */
        .cell.revealed {
            background-color: var(--cell-open);
            box-shadow: inset 1px 1px 3px rgba(0,0,0,0.2);
            cursor: default;
        }

        /* Цвета цифр */
        .cell[data-value="1"] { color: #1d4ed8; }
        .cell[data-value="2"] { color: #15803d; }
        .cell[data-value="3"] { color: #b91c1c; }
        .cell[data-value="4"] { color: #6d28d9; }
        .cell[data-value="5"] { color: #7c2d12; }
        .cell[data-value="6"] { color: #0f766e; }
        .cell[data-value="7"] { color: #000000; }
        .cell[data-value="8"] { color: #52525b; }

        /* Анимации */
        @keyframes explode {
            0% { transform: scale(1); background-color: #ef4444; }
            50% { transform: scale(1.3); background-color: #fca5a5; z-index: 10;}
            100% { transform: scale(1); background-color: #ef4444; z-index: 1;}
        }
        .cell.exploded {
            animation: explode 0.5s ease-out forwards;
            color: #450a0a;
            box-shadow: 0 0 10px #ef4444;
        }

        @keyframes pop {
            0% { transform: scale(0); }
            70% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .cell .flag-icon, .cell .mine-icon {
            display: inline-block;
            animation: pop 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .cell .flag-icon { color: #ef4444; text-shadow: 1px 1px 0 #000; }
        .cell .mine-icon { color: #111827; }
        .cell.wrong-flag .flag-icon { color: #94a3b8; }
        
        /* Крестик для неверного флага */
        .cell.wrong-flag::after {
            content: '❌';
            position: absolute;
            font-size: calc(var(--cell-size) * 0.6);
            z-index: 2;
            animation: pop 0.3s forwards;
        }

        @media (hover: hover) {
            .cell:hover:not(.revealed) { background-color: var(--cell-closed-hover); }
            .cell.revealed[data-value]:hover { background-color: #e2e8f0; } /* Подсветка для аккорда */
        }

        /* Эффект нажатия на цифру для аккорда */
        .cell.revealed.chord-active {
            filter: brightness(0.9);
        }

        /* Модальные окна */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center;
            z-index: 50; opacity: 0; transition: opacity 0.3s;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        
        .modal-content {
            background: var(--panel-bg);
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 24px; width: 90%; max-width: 420px;
            transform: translateY(20px); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }

        #effects-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 40;
        }

        .mode-btn-active {
            background-color: #3b82f6 !important;
            color: white !important;
            box-shadow: inset 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            border-color: #2563eb !important;
        }

        /* Скроллбары */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); border-radius: 5px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 5px; border: 2px solid var(--bg-color); }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        /* Класс для активной сложности */
        .diff-btn-active {
            background-color: #2563eb !important;
            border-color: #60a5fa !important;
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- CANVAS ДЛЯ ВИЗУАЛЬНЫХ ЭФФЕКТОВ -->
