<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Rhythm X</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at top, #0f1720, #020202 70%);
            overflow: hidden;
        }

        #app {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at top, #111, #000 60%);
            overflow: hidden;
        }

        canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        .screen {
            position: absolute;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 20;
            background: rgba(0, 0, 0, .85);
            backdrop-filter: blur(15px);
            padding: 20px;
        }

        .screen.active {
            display: flex;
        }

        .title {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 40px;
            color: #ffffff; /* Сделали заголовок белым */
            text-shadow: 0 0 20px rgba(0, 255, 247, 0.5);
            text-align: center;
        }

        .btn {
            width: min(350px, 85vw);
            padding: 18px;
            margin: 10px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff; /* Шрифт кнопок белый */
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 1.5px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.2);
        }

        .song {
            width: min(450px, 90vw);
            padding: 20px;
            margin: 8px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: 0.2s;
        }

        .song h2 {
            color: #ffffff; /* Названия песен белые */
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .song p {
            color: #dddddd; /* Описание песен светло-серое/белое */
            font-size: 0.9rem;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 15px;
            right: 15px;
            display: none;
            justify-content: space-between;
            z-index: 10;
        }

        .box {
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
        }

        #feedback {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5rem;
            font-weight: 900;
            opacity: 0;
            z-index: 11;
            pointer-events: none;
        }

        #hpWrap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: #222;
            z-index: 12;
        }

        #hp {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00fff7);
            transition: 0.3s;
        }

        #exit {
            position: absolute;
            bottom: 30px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 12px;
            background: rgba(255, 50, 50, 0.3);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 25;
            display: none;
            font-weight: bold;
        }

        .settings-content {
            color: white;
            text-align: left;
            width: min(350px, 80vw);
            background: rgba(255,255,255,0.05);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin: 15px 0;
            font-size: 1.2rem;
            cursor: pointer;
        }

        @media(max-width: 600px) {
            .title { font-size: 2.2rem; }
            .btn { padding: 15px; font-size: 1rem; }
        }
    </style>
</head>
<body>

<div id="app">
    <canvas id="game"></canvas>
    <div id="hpWrap"><div id="hp"></div></div>

    <div id="ui">
        <div class="box">Score: <span id="score">0</span></div>
        <div class="box">Combo: <span id="combo">0</span></div>
        <div class="box">Miss: <span id="miss">0</span>/10</div>
    </div>

    <div id="feedback"></div>
    <button id="exit">ВЫЙТИ</button>

    <div class="screen active" id="menu">
        <div class="title">NEON RHYTHM X</div>
        <button class="btn" onclick="show('songs')">ИГРАТЬ</button>
        <button class="btn" onclick="show('settings')">НАСТРОЙКИ</button>
    </div>

    <div class="screen" id="songs">
        <div class="title">ВЫБОР ПЕСНИ</div>
        
        <div class="song" onclick="startGame(4, 40, 'songs/fur-elise.mp3')">
            <h2>Fur Elise</h2>
            <p>Сложность: Очень легко</p>
        </div>
        <div class="song" onclick="startGame(6, 70, 'songs/river.mp3')">
            <h2>River Flows In You</h2>
            <p>Сложность: Легко</p>
        </div>
        <div class="song" onclick="startGame(8, 120, 'songs/interstellar.mp3')">
            <h2>Interstellar</h2>
            <p>Сложность: Средне</p>
        </div>
        <div class="song" onclick="startGame(10, 200, 'songs/rush-e.mp3')">
            <h2>Rush E</h2>
            <p>Сложность: Сложно</p>
        </div>

        <button class="btn" style="margin-top:20px" onclick="show('menu')">НАЗАД</button>
    </div>

    <div class="screen" id="settings">
        <div class="title">НАСТРОЙКИ</div>
        <div class="settings-content">
            <label><input type="checkbox" id="effects" checked> Эффекты</label>
            <label><input type="checkbox" id="spam"> Spam Mode</label>
        </div>
        <button class="btn" onclick="show('menu')">НАЗАД</button>
    </div>

    <div class="screen" id="gameover">
        <div class="title">КОНЕЦ ИГРЫ</div>
        <h2 id="final" style="color:white; margin-bottom:30px;">Счёт: 0</h2>
        <button class="btn" onclick="show('songs')">ИГРАТЬ СНОВА</button>
        <button class="btn" onclick="show('menu')">В МЕНЮ</button>
    </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const mobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

let laneWidth, hitY, notes = [], particles = [], score = 0, combo = 0, miss = 0, hp = 100;
let speed = 6, currentAudio = null, playing = false;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    laneWidth = canvas.width / 4;
    hitY = canvas.height - 180;
}
window.addEventListener('resize', resize);
resize();

function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    if (id) document.getElementById(id).classList.add('active');
}

function startGame(gameSpeed, count, song) {
    speed = gameSpeed;
    notes = [];
    particles = [];
    score = 0;
    combo = 0;
    miss = 0;
    hp = 100;
    updateUI();
    
    for (let i = 0; i < count; i++) {
        notes.push({ track: Math.floor(Math.random() * 4), y: -i * 220, hit: false });
    }

    show(null);
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    currentAudio = new Audio(song);
    
    playing = true;
    document.getElementById('ui').style.display = 'flex';
    document.getElementById('exit').style.display = 'block';
    currentAudio.play().catch(() => console.log("Нужен клик для звука"));
    requestAnimationFrame(loop);
}

function endGame() {
    playing = false;
    if (currentAudio) { currentAudio.pause(); }
    document.getElementById('ui').style.display = 'none';
    document.getElementById('exit').style.display = 'none';
    document.getElementById('final').innerText = 'Счёт: ' + score;
    show('gameover');
}

function fx(text, color) {
    const f = document.getElementById('feedback');
    f.innerText = text;
    f.style.color = color;
    f.style.opacity = 1;
    f.style.transform = 'translate(-50%, -50%) scale(1.2)';
    setTimeout(() => { f.style.opacity = 0; f.style.transform = 'translate(-50%, -50%) scale(1)'; }, 150);
}

function updateUI() {
    document.getElementById('score').innerText = score;
    document.getElementById('combo').innerText = combo;
    document.getElementById('miss').innerText = miss;
    document.getElementById('hp').style.width = hp + '%';
}

function hit(track) {
    if (!playing) return;
    let success = false;
    for (let n of notes) {
        if (n.hit || n.track !== track) continue;
        const dist = Math.abs(n.y - hitY);
        if (dist < 90) {
            n.hit = true;
            success = true;
            combo++;
            score += 100 * combo;
            fx(dist < 40 ? 'PERFECT' : 'GOOD', dist < 40 ? '#00ff88' : '#ffe600');
            break;
        }
    }
    if (!success) {
        combo = 0; miss++; hp -= 10;
        fx('MISS', '#ff4444');
    }
    updateUI();
    if (miss >= 10 || hp <= 0) endGame();
}

// Управление
window.addEventListener('keydown', e => {
    const keys = ['d', 'f', 'j', 'k'];
    const idx = keys.indexOf(e.key.toLowerCase());
    if (idx !== -1) hit(idx);
});

canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    for (let t of e.touches) {
        const x = t.clientX - rect.left;
        hit(Math.floor(x / (rect.width / 4)));
    }
}, {passive: false});

function loop() {
    if (!playing) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Отрисовка дорожек
    for (let i = 0; i < 4; i++) {
        ctx.fillStyle = i % 2 === 0 ? 'rgba(255,255,255,0.02)' : 'rgba(255,255,255,0.04)';
        ctx.fillRect(i * laneWidth, 0, laneWidth, canvas.height);
    }

    // Линия нажатия
    ctx.strokeStyle = '#00fff7';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(0, hitY); ctx.lineTo(canvas.width, hitY); ctx.stroke();

    // Ноты
    for (let n of notes) {
        if (n.hit) continue;
        n.y += speed;
        ctx.beginPath();
        ctx.fillStyle = ['#00fff7', '#ff00ea', '#00ff88', '#ffe600'][n.track];
        ctx.arc(n.track * laneWidth + laneWidth / 2, n.y, 35, 0, Math.PI * 2);
        ctx.fill();

        if (n.y > canvas.height + 50) {
            n.hit = true; combo = 0; miss++; hp -= 10;
            fx('MISS', '#ff4444'); updateUI();
            if (miss >= 10 || hp <= 0) endGame();
        }
    }
    requestAnimationFrame(loop);
}

document.getElementById('exit').onclick = () => endGame();
</script>

</body>
</html>
