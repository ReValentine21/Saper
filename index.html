<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Merge Defense Mobile</title>
    <style>
        :root { --bg: #0a0a12; --grid: #1a1a2e; --accent: #4ecca3; --gold: #f1c40f; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; text-align: center; }
        #header { padding: 15px; display: flex; justify-content: space-around; background: #16213e; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .stat-val { font-size: 20px; font-weight: bold; color: var(--gold); }
        
        /* Игровое поле */
        #game-container { position: relative; width: 100vw; height: 70vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #enemy-lane { width: 100%; height: 100px; position: relative; border-bottom: 2px dashed #333; margin-bottom: 20px; }
        #grid { 
            display: grid; grid-template-columns: repeat(3, 80px); grid-template-rows: repeat(3, 80px); 
            gap: 10px; padding: 10px; background: var(--grid); border-radius: 15px; 
        }
        .slot { 
            width: 80px; height: 80px; background: #0f3460; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; font-size: 30px;
            transition: 0.2s; position: relative; border: 2px solid transparent;
        }
        .slot.active { border-color: var(--accent); transform: scale(1.05); }
        .unit { position: absolute; pointer-events: none; z-index: 10; transition: transform 0.1s; }
        
        /* Враги */
        .enemy { position: absolute; font-size: 30px; transition: left 0.1s linear; top: 30px; }
        
        /* Кнопка */
        #buy-btn {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 80%; padding: 20px; border-radius: 40px; border: none;
            background: var(--accent); color: #1b262c; font-size: 20px; font-weight: bold;
            box-shadow: 0 10px 0 #3da082; active: transform: translateY(5px);
        }
        #buy-btn:active { transform: translateX(-50%) translateY(5px); box-shadow: 0 5px 0 #3da082; }
    </style>
</head>
<body>

    <div id="header">
        <div>💰 <span id="gold" class="stat-val">50</span></div>
        <div>❤️ <span id="hp" class="stat-val">10</span></div>
        <div>🏆 <span id="wave" class="stat-val">1</span></div>
    </div>

    <div id="game-container">
        <div id="enemy-lane"></div>
        <div id="grid">
            <!-- 9 слотов -->
            <div class="slot" data-id="0"></div><div class="slot" data-id="1"></div><div class="slot" data-id="2"></div>
            <div class="slot" data-id="3"></div><div class="slot" data-id="4"></div><div class="slot" data-id="5"></div>
            <div class="slot" data-id="6"></div><div class="slot" data-id="7"></div><div class="slot" data-id="8"></div>
        </div>
    </div>

    <button id="buy-btn">КУПИТЬ ВОИНА (💰 <span id="price">10</span>)</button>

<script>
    let state = { gold: 50, hp: 10, wave: 1, price: 10, units: Array(9).fill(null) };
    const icons = ["🐣", "🐥", "🛡️", "⚔️", "🧙", "🔥", "💎", "👑"];
    let selectedSlot = null;

    const grid = document.getElementById('grid');
    const slots = document.querySelectorAll('.slot');
    const enemyLane = document.getElementById('enemy-lane');

    // Покупка юнита
    document.getElementById('buy-btn').onclick = () => {
        let emptyIdx = state.units.findIndex(u => u === null);
        if (emptyIdx !== -1 && state.gold >= state.price) {
            state.gold -= state.price;
            state.units[emptyIdx] = 0; // уровень 0 (🐣)
            state.price = Math.floor(state.price * 1.2);
            render();
            vibrate(50);
        }
    };

    // Логика клика/мерджа
    slots.forEach(slot => {
        slot.onclick = () => {
            const id = parseInt(slot.dataset.id);
            if (selectedSlot === null) {
                if (state.units[id] !== null) {
                    selectedSlot = id;
                    slot.classList.add('active');
                }
            } else {
                if (selectedSlot === id) {
                    selectedSlot = null;
                    slot.classList.remove('active');
                } else if (state.units[id] === state.units[selectedSlot]) {
                    // МЕРДЖ!
                    state.units[id]++;
                    state.units[selectedSlot] = null;
                    selectedSlot = null;
                    vibrate(100);
                    render();
                } else {
                    // Просто поменять местами
                    let temp = state.units[id];
                    state.units[id] = state.units[selectedSlot];
                    state.units[selectedSlot] = temp;
                    selectedSlot = null;
                    render();
                }
            }
        };
    });

    function render() {
        slots.forEach((slot, i) => {
            slot.innerHTML = state.units[i] !== null ? icons[state.units[i]] || "🌟" : "";
            slot.classList.remove('active');
        });
        document.getElementById('gold').innerText = Math.floor(state.gold);
        document.getElementById('price').innerText = state.price;
        document.getElementById('hp').innerText = state.hp;
        document.getElementById('wave').innerText = state.wave;
    }

    // Враги и стрельба
    let enemies = [];
    setInterval(() => {
        // Юниты стреляют
        state.units.forEach(u => {
            if (u !== null && enemies.length > 0) {
                enemies[0].hp -= (u + 1) * 0.2;
            }
        });

        // Враги идут
        enemies.forEach((en, i) => {
            en.x -= 2;
            en.el.style.left = en.x + 'px';
            if (en.hp <= 0) {
                en.el.remove();
                enemies.splice(i, 1);
                state.gold += 5 + state.wave;
                render();
            } else if (en.x < 0) {
                en.el.remove();
                enemies.splice(i, 1);
                state.hp--;
                render();
                if (state.hp <= 0) location.reload();
            }
        });
    }, 50);

    // Спавн врагов
    setInterval(() => {
        const el = document.createElement('div');
        el.className = 'enemy';
        el.innerText = '👹';
        enemyLane.appendChild(el);
        enemies.push({ x: window.innerWidth, hp: 5 + state.wave * 2, el: el });
        state.wave++;
    }, 3000);

    function vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

    render();
</script>
</body>
</html>
