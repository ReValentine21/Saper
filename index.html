<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Blast Clone</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; /* Запрет выделения текста */
        }

        body {
            background-color: #3B549B; /* Темно-синий фон как на скриншоте */
            font-family: 'Fredoka One', cursive, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: white;
        }

        #app {
            width: 100%;
            max-width: 500px;
            height: 100%;
            max-height: 900px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
        }

        /* Шапка с очками */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            margin-top: 20px;
        }

        .score-container {
            display: flex;
            align-items: center;
            color: #FFC107;
            font-size: 24px;
        }

        .crown {
            font-size: 28px;
            margin-right: 5px;
        }

        .settings-btn {
            background: none;
            border: none;
            color: #FFC107;
            font-size: 30px;
            cursor: pointer;
        }

        .current-score {
            font-size: 64px;
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
        }

        /* Игровое поле */
        .board-container {
            background-color: #273970;
            border-radius: 10px;
            padding: 5px;
            box-shadow: inset 0px 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 40px;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 2px;
            aspect-ratio: 1 / 1; /* Делает поле всегда квадратным */
        }

        /* Стили для пустых ячеек и блоков */
        .cell {
            background-color: #1E2D58; /* Цвет пустой ячейки */
            border-radius: 4px;
        }

        /* Класс для заполненного блока (голубой с 3D эффектом) */
        .block-filled {
            background-color: #31B5FF;
            border-top: 3px solid #8BE0FF;
            border-left: 3px solid #8BE0FF;
            border-bottom: 3px solid #007DD6;
            border-right: 3px solid #007DD6;
            border-radius: 4px;
        }

        /* Контейнер для спавна фигур внизу */
        #spawn-area {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex: 1;
        }

        .spawn-slot {
            width: 80px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Мини-сетка для отрисовки фигур внизу */
        .shape {
            display: grid;
            gap: 2px;
        }
        
        .shape .cell {
            width: 20px;
            height: 20px;
            background-color: transparent;
        }

        .shape .block-filled {
            width: 20px;
            height: 20px;
        }

    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="score-container">
            <span class="crown">👑</span>
            <span>262665</span>
        </div>
        <button class="settings-btn">⚙️</button>
    </header>

    <div class="current-score">0</div>

    <div class="board-container">
        <div id="board"></div>
    </div>

    <div id="spawn-area">
        <div class="spawn-slot" id="slot-1"></div>
        <div class="spawn-slot" id="slot-2"></div>
        <div class="spawn-slot" id="slot-3"></div>
    </div>
</div>

<script>
    // 1. Генерация сетки игрового поля 8x8
    const board = document.getElementById('board');
    const boardSize = 8;

    // Для примера заполним несколько клеток, чтобы было похоже на скриншот 2
    const exampleFilledCells = [
        0, 1, 2, 4, 6, 7,
        8, 9, 10, 11, 14,
        16, 17, 18, 21, 22, 23,
        27, 28, 30, 31,
        32, 33, 34, 35, 36, 37, 38,
        40, 42, 43, 44,
        48, 50, 52, 53, 54,
        57, 58, 59, 60
    ];

    for (let i = 0; i < boardSize * boardSize; i++) {
        const cell = document.createElement('div');
        cell.classList.add('cell');
        
        // Добавляем класс block-filled, если индекс есть в нашем тестовом массиве
        if (exampleFilledCells.includes(i)) {
            cell.classList.add('block-filled');
        }
        
        board.appendChild(cell);
    }

    // 2. Функция для отрисовки фигур в нижних слотах
    function drawShape(slotId, shapeMatrix) {
        const slot = document.getElementById(slotId);
        const shapeContainer = document.createElement('div');
        shapeContainer.classList.add('shape');
        
        const rows = shapeMatrix.length;
        const cols = shapeMatrix[0].length;
        
        shapeContainer.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        shapeContainer.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const block = document.createElement('div');
                if (shapeMatrix[r][c] === 1) {
                    block.classList.add('block-filled');
                } else {
                    block.classList.add('cell'); // Прозрачная ячейка для структуры
                }
                shapeContainer.appendChild(block);
            }
        }
        slot.appendChild(shapeContainer);
    }

    // Фигуры как на скриншоте (1 - блок, 0 - пустота)
    const shape1 = [
        [1, 1, 0],
        [0, 1, 0],
        [0, 1, 0]
    ];

    const shape2 = [
        [1]
    ];

    const shape3 = [
        [0, 0, 1],
        [0, 0, 1],
        [1, 1, 1]
    ];

    // Отрисовываем фигуры
    drawShape('slot-1', shape1);
    drawShape('slot-2', shape2);
    drawShape('slot-3', shape3);

</script>

</body>
</html>
